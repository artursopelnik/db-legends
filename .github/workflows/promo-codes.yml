name: Update promo codes

on:
  schedule:
    - cron: '23 5 * * *'   # taeglich 05:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch promo codes
        run: python3 scripts/fetch_promo_codes.py

      - name: Commit and trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet promo-codes.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add promo-codes.json
          git commit -m "Update promo codes"
          git push
          gh workflow run pages.yml --ref main
